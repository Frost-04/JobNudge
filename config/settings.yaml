run:
  headless: true
  request_timeout_seconds: 30
  page_load_timeout_seconds: 45
  delay_between_companies_seconds: 3
  max_jobs_per_company: 100
  max_concurrent_scrapers: 3
  browser_channel: chrome
  scraper_timeout_seconds: 180

storage:
  database_path: "data/seen_jobs.db"
  new_jobs_csv_path: "data/new_jobs.csv"
  jobs_to_send_csv_path: "data/jobs_to_send.csv"

logging:
  log_file_path: "data/logs/scraper.log"
  log_level: "INFO"

notifications:
  channel: "console"
  send_empty_report: false
  max_jobs_per_alert: 20

health_check:
  scraper_timeout_seconds: 300

ai:
  # Which AI provider to use: "gemini" or "deepseek"
  provider: "gemini"

  # Gemini settings
  gemini:
    # Models: gemini-2.5-flash, gemini-2.5-pro, gemini-2.0-flash
    model: "gemini-2.5-flash"

  # DeepSeek settings
  deepseek:
    # Models: deepseek-v4-pro, deepseek-v4-flash
    # deepseek-v4-pro   → highest accuracy, slower
    # deepseek-v4-flash → faster, cheaper
    model: "deepseek-v4-flash"

  max_jobs_per_batch: 15
